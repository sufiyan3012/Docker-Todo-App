<!DOCTYPE html>
<html>

<head>
    <title>Edit Task</title>
</head>

<body>

<h1>Edit Task</h1>

<form action="/update/{{ task[0] }}" method="POST">

    <input
        type="text"
        name="task"
        value="{{ task[1] }}"
        required>

    <br><br>

    <select name="status">

        <option value="Pending"
        {% if task[2]=='Pending' %}
        selected
        {% endif %}
        >
        Pending
        </option>

        <option value="Completed"
        {% if task[2]=='Completed' %}
        selected
        {% endif %}
        >
        Completed
        </option>

    </select>

    <br><br>

    <button type="submit">
        Update
    </button>

</form>

</body>

</html>
