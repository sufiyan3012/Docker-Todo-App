<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Docker Todo App</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">
            <h3 class="text-center">
                Docker Todo Application
            </h3>
        </div>

        <div class="card-body">

            <form action="/" method="POST">

                <div class="row">

                    <div class="col-md-5">
                        <input
                            type="text"
                            class="form-control"
                            name="task"
                            placeholder="Enter Task"
                            required>
                    </div>

                    <div class="col-md-3">
                        <input
                            type="date"
                            class="form-control"
                            name="due_date">
                    </div>

                    <div class="col-md-2">
                        <button class="btn btn-success w-100">
                            Add Task
                        </button>
                    </div>

                </div>

            </form>

            <hr>

            <table class="table table-bordered table-hover">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Task</th>
                    <th>Created</th>
                    <th>Due Date</th>
                    <th>Status</th>
                    <th>Action</th>

                </tr>

                </thead>

                <tbody>

                {% for task in tasks %}

                <tr>

                    <td>{{ task.id }}</td>

                    <td>{{ task.task }}</td>

                    <td>{{ task.created_date.strftime('%Y-%m-%d %H:%M:%S') }}</td>

                    <td>{{ task.due_date }}</td>

                    <td>

                        {% if task.status == 'Completed' %}

                        <span class="badge bg-success">
                            Completed
                        </span>

                        {% else %}

                        <span class="badge bg-warning text-dark">
                            Pending
                        </span>

                        {% endif %}

                    </td>

                    <td>

                        <a href="/complete/{{ task.id }}"
                           class="btn btn-primary btn-sm">
                            Complete
                        </a>

                        <a href="/delete/{{ task.id }}"
                           class="btn btn-danger btn-sm">
                            Delete
                        </a>

                    </td>

                </tr>

                {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>
</html>
