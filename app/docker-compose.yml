version: "3.9"

services:
  flask:
    build: .
    container_name: flask-app
    ports: 
      - "5000:5000"
    depends_on:
      - mysql
    
  mysql:
    image: mysql:8.0
    container_name: mysql-db
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: tododb
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      
  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ../nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - flask
      
volumes:
  mysql_data:
      

